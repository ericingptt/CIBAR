<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 防詐調查任務</title>
  </head>
  <body style="margin:0;min-height:100vh;display:grid;place-items:center;background:#06162d;color:#f6fbff;font-family:system-ui,-apple-system,'Noto Sans TC',sans-serif;text-align:center;padding:24px">
    <div style="max-width:520px">
      <h1 style="font-size:22px">這個網址目前沒有內容</h1>
      <p style="color:#b9c7d9;line-height:1.7">
        本站的正式版本是透過 GitHub Actions 建置、部署自 <code>webapp/</code> 資料夾。
        如果你看到這個畫面，代表這個 repo 的 GitHub Pages 設定還是「Deploy from a branch」，
        蓋掉了 Actions 部署的結果。
      </p>
      <p style="color:#b9c7d9;line-height:1.7">
        請到 repo <strong>Settings → Pages → Build and deployment → Source</strong>，
        改成 <strong>GitHub Actions</strong>，改完後這個網址就會改成顯示 <code>webapp/</code> 建置出來的正式版本。
      </p>
    </div>
  </body>
</html>
