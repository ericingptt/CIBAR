<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="manifest" href="manifest.json?v=20260720-1">
  <link rel="stylesheet" href="css/style.css?v=20260720-1">
  <title>AI 防詐調查任務</title>
</head>
<body>
  <main class="app ar-stage">
    <div class="topbar">
      <div class="brand">CIB AR ANTI-FRAUD</div>
    </div>
    <section class="hero">
      <p class="mini">刑事警察局 AR 反詐騙教育館</p>
      <h1>AI 防詐調查任務</h1>
      <p>你將化身反詐小刑警，透過 AR 眼鏡尋找現場可疑線索。掃描桌上物件或背板圖案，進入對應詐騙情境。</p>
      <h2>請選擇語言</h2>
      <div class="lang-grid" aria-label="語言選擇" id="languageChoices">
        <button class="choice" data-lang="zh">🇹🇼 中文<span class="chevron" aria-hidden="true">›</span></button>
        <button class="choice" data-lang="en">🇺🇸 English<span class="chevron" aria-hidden="true">›</span></button>
        <button class="choice" data-lang="jp">🇯🇵 日本語<span class="chevron" aria-hidden="true">›</span></button>
      </div>
    </section>
    <section class="card calibration-card" id="calibrationPanel" hidden>
      <p class="mini">操作校正</p>
      <h2>開啟鏡頭並校正手勢</h2>
      <p>鏡頭影像僅用於即時手勢辨識，不會錄影或上傳。</p>
      <div class="calibration-view">
        <div class="hand-frame"><span></span></div>
        <div class="calibration-check" id="calibrationCheck" hidden>✓</div>
      </div>
      <p class="mini calibration-step" id="calibrationStep"></p>
      <p id="calibrationStatus">請點擊下方按鈕，瀏覽器才會要求鏡頭權限。</p>
      <div class="btns">
        <button class="btn" id="startCalibration" type="button">開啟鏡頭並開始校正</button>
        <button class="btn secondary" id="skipCalibration" type="button" hidden>略過校正並開啟掃描</button>
      </div>
    </section>
  </main>
  <script src="js/camera-manager.js?v=20260720-1"></script>
  <script src="js/gesture-calibration.js?v=20260720-1"></script>
  <script src="js/app.js?v=20260720-1"></script>
  <script>initLang();initGestureCalibration()</script>
</body>
</html>
