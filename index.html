<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <title>AI 防詐調查任務</title>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div class="brand">CIB AR ANTI-FRAUD</div>
    </div>
    <section class="hero">
      <p class="mini">刑事警察局 AR 反詐騙教育館</p>
      <h1>AI 防詐調查任務</h1>
      <p>你將化身反詐小刑警，透過 AR 眼鏡尋找現場可疑線索。掃描桌上物件或背板圖案，進入對應詐騙情境。</p>
      <h2>請選擇語言</h2>
      <div class="lang-grid" aria-label="語言選擇">
        <button class="choice" data-lang="zh"><img class="flag" src="assets/common/flags/tw.svg" alt="" aria-hidden="true"><span class="label">中文</span><span class="chevron" aria-hidden="true">&gt;</span></button>
        <button class="choice" data-lang="en"><img class="flag" src="assets/common/flags/us.svg" alt="" aria-hidden="true"><span class="label">English</span><span class="chevron" aria-hidden="true">&gt;</span></button>
        <button class="choice" data-lang="jp"><img class="flag" src="assets/common/flags/jp.svg" alt="" aria-hidden="true"><span class="label">日本語</span><span class="chevron" aria-hidden="true">&gt;</span></button>
      </div>
    </section>
  </main>
  <script src="js/app.js"></script>
  <script>initLang()</script>
</body>
</html>
