<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="../css/style.css?v=20260720-10">
  <title>帳面獲利</title>
</head>
<body class="camera-page">
  <main class="app ar-stage">
    <div class="topbar">
      <div class="brand">資產總覽</div>
      <a class="home-link" href="../index.html">首頁</a>
    </div>
    <section class="platform profit-platform">
      <p>投入本金：NT$10,000</p>
      <div class="asset-row">
        <div>
          <span class="mini">總資產</span>
          <div class="big-money" id="money">NT$10,000</div>
        </div>
        <div class="profit-badge" id="profitBadge">+0.0%</div>
      </div>
      <div class="fake-chart" aria-label="投資平台帳面獲利 K 線圖">
        <div class="chart-top"><span>AI 智能量化合約</span><strong>LIVE</strong></div>
        <svg class="candlestick-chart" viewBox="0 0 360 130" preserveAspectRatio="none" role="img" aria-label="震盪上漲的 K 線圖">
          <defs>
            <linearGradient id="chartGlow" x1="0" x2="1" y1="1" y2="0"><stop offset="0%" stop-color="#39d98a"/><stop offset="100%" stop-color="#25d0ff"/></linearGradient>
          </defs>
          <g class="grid"><path d="M0 25H360M0 54H360M0 83H360M0 112H360"/><path d="M45 0V130M115 0V130M185 0V130M255 0V130M325 0V130"/></g>
          <polyline class="trend-line" points="22,102 58,91 94,98 130,73 166,81 202,55 238,63 274,39 310,45 342,22"/>
          <g class="candles">
            <g class="candle" style="--i:0"><line x1="24" y1="108" x2="24" y2="95"/><rect x="18" y="99" width="12" height="7"/></g>
            <g class="candle" style="--i:1"><line x1="58" y1="96" x2="58" y2="84"/><rect x="52" y="87" width="12" height="7"/></g>
            <g class="candle candle-down" style="--i:2"><line x1="92" y1="102" x2="92" y2="87"/><rect x="86" y="91" width="12" height="9"/></g>
            <g class="candle" style="--i:3"><line x1="126" y1="81" x2="126" y2="66"/><rect x="120" y="71" width="12" height="9"/></g>
            <g class="candle candle-down" style="--i:4"><line x1="160" y1="86" x2="160" y2="71"/><rect x="154" y="75" width="12" height="9"/></g>
            <g class="candle" style="--i:5"><line x1="194" y1="63" x2="194" y2="49"/><rect x="188" y="53" width="12" height="9"/></g>
            <g class="candle candle-down" style="--i:6"><line x1="228" y1="69" x2="228" y2="54"/><rect x="222" y="58" width="12" height="9"/></g>
            <g class="candle" style="--i:7"><line x1="262" y1="47" x2="262" y2="32"/><rect x="256" y="37" width="12" height="9"/></g>
            <g class="candle candle-down" style="--i:8"><line x1="296" y1="51" x2="296" y2="36"/><rect x="290" y="40" width="12" height="9"/></g>
            <g class="candle" style="--i:9"><line x1="330" y1="30" x2="330" y2="14"/><rect x="324" y="19" width="12" height="9"/></g>
          </g>
        </svg>
        <div class="chart-bottom"><span>今日收益</span><strong id="chartGain">+NT$0</strong></div>
      </div>
      <div class="stat"><span>今日收益</span><span id="statGain">+NT$0</span></div>
      <div class="stat"><span>報酬率</span><span id="statPercent">+0.0%</span></div>
      <p>系統訊息：恭喜您完成今日操作。</p>
      <button class="btn withdraw-btn" id="withdrawBtn" onclick="go('scene01_withdraw_fail.html')" hidden>申請出金</button>
    </section>
  </main>
  <script src="../js/camera-manager.js?v=20260720-10"></script><script src="../js/gesture-controller.js?v=20260720-10"></script><script src="../js/gesture-nav.js?v=20260720-10"></script><script src="../js/app.js?v=20260720-10"></script><script>initPageCamera()</script>
  <script>initProfitAnimation()</script>
</body>
</html>
