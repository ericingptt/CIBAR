<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../css/style.css?v=20260720-8"><title>投資老師影片</title></head><body class="camera-page"><main class="app ar-stage"><div class="topbar"><div class="brand">30 天掌握飆股趨勢</div><a class="home-link" href="../index.html">首頁</a></div><section class="card"><div class="video-box teacher-video-box"><video id="teacherVideo" class="teacher-video" src="../assets/scenario01-investment/video/chen-teacher-pitch.mp4" playsinline></video><button class="btn video-play-btn" id="videoPlayBtn" type="button" hidden>▶ 播放影片</button></div><div class="progress"><div class="bar" id="bar"></div></div><p class="mini">播放秒數：<span id="sec">0</span>s</p><button id="joinLine" style="margin-top:18px" class="btn" onclick="go('scene01_line_teacher.html')">加入 LINE 了解更多</button></section></main><div class="modal" id="warningModal"><div class="warning"><h2>⚠ AI 即時辨識</h2><p><b>高風險投資話術</b></p><p>偵測到關鍵字：「不用自己盯盤研究」、「許多會員持續穩定獲利」。這類話術透過過度承諾與營造「大家都賺錢」的社會認同壓力，誘導您降低戒心。實際投資績效因人而異，跟單前請務必查證對方的合法授權與真實績效紀錄。</p><button class="btn danger" id="continueVideo">繼續觀看</button></div></div><script src="../js/camera-manager.js?v=20260720-8"></script><script src="../js/gesture-controller.js?v=20260720-8"></script><script src="../js/gesture-nav.js?v=20260720-8"></script><script src="../js/app.js?v=20260720-8"></script><script>initPageCamera()</script>
<script>
  (function(){
    const video = document.getElementById('teacherVideo');
    const bar = document.getElementById('bar');
    const sec = document.getElementById('sec');
    const modal = document.getElementById('warningModal');
    const joinBtn = document.getElementById('joinLine');
    const playBtn = document.getElementById('videoPlayBtn');
    // The two flagged lines ("不用自己盯盤研究，跟著策略執行就好" ~36s, "已經有許多會員透過這個方式持續穩定獲利" ~41s)
    // are near the end of this 48s video. Waiting for the real 'ended' event (rather than pausing at a
    // guessed mid-video timestamp) guarantees the warning never appears before the user has heard both
    // lines, without risking cutting off the audio if the exact line timing is off by a second or two.
    video.addEventListener('timeupdate', () => {
      if(video.duration) bar.style.width = Math.min((video.currentTime / video.duration) * 100, 100) + '%';
      sec.textContent = Math.floor(video.currentTime);
    });
    video.addEventListener('ended', () => { modal.classList.add('show'); });
    document.getElementById('continueVideo').onclick = () => {
      modal.classList.remove('show');
      joinBtn.style.display = 'block';
    };
    video.play().catch(() => { playBtn.hidden = false; });
    playBtn.onclick = () => { playBtn.hidden = true; video.play().catch(() => {}); };
  })();
</script>
</body></html>
