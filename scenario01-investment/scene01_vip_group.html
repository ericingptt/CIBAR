<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="../css/style.css">
  <title>VIP 群組</title>
</head>
<body>
  <main class="app ar-stage">
    <div class="topbar">
      <div class="brand">陳老師 AI 飆股｜321 人</div>
      <a class="home-link" href="../index.html">首頁</a>
    </div>
    <section class="chat vip-chat" id="chatBox" aria-live="polite"></section>
    <div class="btns">
      <button id="nextBtn" style="display:none" class="btn" onclick="go('scene01_platform_register.html')">前往註冊平台</button>
    </div>
  </main>

  <div class="modal" id="vipWarningModal">
    <div class="warning">
      <h2>AI 提示</h2>
      <p>偵測到高風險投資訊息：<br>大量獲利截圖、短時間快速收益、成功出金回報。</p>
      <p>這類內容可能是詐騙集團安排的暗樁話術，<br>請勿僅依據群組訊息作為投資判斷。</p>
      <button class="btn danger" id="continueVip">繼續體驗</button>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script>
    document.querySelector('#continueVip').addEventListener('click', () => {
      document.querySelector('#vipWarningModal').classList.remove('show');
    });

    typeMessages([
      {text:'你已加入群組。',type:'system',delay:800},
      {text:'陳老師：今天盤勢很漂亮，AI 模型剛剛抓到一檔短線標的。'},
      {text:'小林助理：新朋友可以先觀察，老師等等會公布操作方向。'},
      {text:'阿凱：我昨天跟老師那檔，今天開盤就拉上去了，真的有點誇張。'},
      {text:'Jenny：我剛剛試著出金，已經入帳了，謝謝老師。'},
      {text:'股海小白：原本只是進來看看，沒想到三天就有收益。'},
      {text:'王先生：我今天先小額跟 1 萬，想先試水溫。'},
      {text:'小雅：早上看帳面多了 2,800，雖然不多但很有感。'},
      {text:'小林助理：目前下午場名額剩 12 位，還沒補資料的我會一對一提醒。',showVipWarning:true},
      {text:'Kevin：昨天照老師提醒停利，剛剛本金跟獲利都回到帳戶了。'},
      {text:'財富自由ing：我先把上週獲利留下來，今天準備再加碼一點。'},
      {text:'陳老師：今天這檔不適合猶豫，下午 2 點前完成入金，晚上我會公布操作策略。'},
      {text:'小林助理：還沒完成註冊的新朋友，請先點下方連結開通帳戶。'},
      {text:'陳老師：完成平台註冊後把帳號截圖私訊助理，方便我安排今晚的操作名單。'}
    ],'#nextBtn',{messageDelay:1200,typingDelay:650});
  </script>
</body>
</html>
