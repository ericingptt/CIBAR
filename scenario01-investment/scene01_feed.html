<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="../css/style.css">
  <title>社群動態牆</title>
</head>
<body>
  <main class="app social-app">
    <div class="social-topbar">
      <a class="home-link" href="../index.html">首頁</a>

      <div class="post social-post">
        <div class="post-meta"><span class="avatar">咖</span><b>生活日常</b><small>剛剛</small></div>
        <p>今天咖啡不錯，工作繼續加油。</p>
      </div>
      <div class="post social-post">
        <div class="post-meta"><span class="avatar">新</span><b>新聞快訊</b><small>12 分鐘</small></div>
        <p>市場震盪，投資人觀望。</p>

          <p>免費加入陳老師直播課</p>
        </div>
        <button class="btn" onclick="go('scene01_video_teacher.html')">了解更多</button>
      </div>
    </section>
  </main>
  <script src="../js/app.js"></script>
  <script>initAdLabel()</script>
</body>
</html>
