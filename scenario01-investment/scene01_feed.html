<!doctype html>
<html lang="zh-Hant">
<head>

<body>
  <main class="app social-app">

      <a class="home-link" href="../index.html">首頁</a>

      <div class="post social-post">
        <div class="post-meta"><span class="avatar">阿</span><b>阿哲</b><small>剛剛</small></div>

        </div>
        <div class="post-engagement"><span>👍 2.8萬</span><span>💬 312</span><span>↗ 128</span></div>

          <p><b>Kevin Lin</b>跟老師兩週，第一次知道股票可以這樣看。</p>
          <p><b>Jenny</b>有人已經加入了嗎？我今天剛申請。</p>
          <p><b>股海小白</b>昨天第一次跟，今天真的有賺一點。</p>
        </div>
        <button class="btn" onclick="go('scene01_video_teacher.html')">了解更多</button>
      </div>
      <div class="post social-post">
        <div class="post-meta"><span class="avatar">J</span><b>Jenny</b><small>剛剛</small></div>
        <p>今天終於下班後去運動，累但舒服。</p>
        <div class="post-engagement"><span>👍 52</span><span>💬 9</span><span>↗ 1</span></div>
      </div>
    </section>
  </main>
  <script src="../js/app.js"></script>
