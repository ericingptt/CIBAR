<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="../css/style.css?v=20260720-6">
  <title>陳老師投資助理</title>
</head>
<body class="camera-page">
  <main class="app ar-stage">
    <section class="phone-frame">
      <header class="chat-header">
        <div class="chat-person">
          <div class="chat-avatar">陳</div>
          <div>
            <div class="chat-title">陳老師投資助理</div>
            <small>線上</small>
          </div>
        </div>
      </header>
      <section class="chat line-chat" id="chatBox" aria-live="polite"></section>
      <div class="btns chat-actions" id="choiceActions" hidden>
        <button class="btn secondary line-choice-btn" type="button" data-choice="A">我想直接跟老師操作</button>
        <button class="btn secondary line-choice-btn" type="button" data-choice="B">我想先自己試試看</button>
      </div>
      <div class="btns chat-actions">
        <button id="nextBtn" hidden class="btn" onclick="go('scene01_vip_group.html')">加入 VIP 群組</button>
      </div>
    </section>
  </main>
  <script src="../js/camera-manager.js?v=20260720-6"></script><script src="../js/gesture-controller.js?v=20260720-6"></script><script src="../js/gesture-nav.js?v=20260720-6"></script><script src="../js/app.js?v=20260720-6"></script><script>initPageCamera()</script>
  <script>
    const chatBox = document.querySelector('#chatBox');
    const choiceActions = document.querySelector('#choiceActions');
    const nextBtn = document.querySelector('#nextBtn');
    const readDelay = 1900;
    const typingDelay = 1000;

    const openingMessages = [
      '您好😊\n歡迎加入陳老師 AI 選股體驗。',
      '剛剛看到您是從 AI 選股直播課進來的，想先了解一下您的需求。',
      '請問您目前比較傾向哪一種方式？'
    ];

    const routes = {
      A: {
        user: '我想直接跟老師操作',
        assistant: [
          '沒問題😊\n很多新朋友一開始也是希望有人帶著操作，這樣比較安心。',
          '老師平常不會在公開頁面直接公布標的，主要是在 VIP 群組裡即時分享盤勢和操作策略。',
          '我可以先邀請您進群，等等老師有新的操作提醒，您就能第一時間看到。'
        ]
      },
      B: {
        user: '我想先自己試試看',
        assistant: [
          '可以理解😊\n很多學員一開始也是想先自己研究看看。',
          '老師不會強迫大家跟單，您也可以先進 VIP 群組觀察大家每天怎麼分析市場。',
          '裡面會有老師的盤勢解析、學員交流和操作紀錄，您可以先學習，不一定要馬上投入。',
          '而且群組目前免費，不懂的地方也可以直接發問。',
          '我先幫您開通 VIP 群組邀請，您進去看看大家怎麼操作就好。'
        ]
      }
    };

    function scrollChat(){
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addChatMessage(text, type = ''){
      const div = document.createElement('div');
      div.className = `msg ${type}`.trim();
      div.textContent = text;
      chatBox.appendChild(div);
      scrollChat();
    }

    function showTyping(){
      const div = document.createElement('div');
      div.className = 'msg typing';
      div.setAttribute('aria-label', '正在輸入');
      div.innerHTML = '<span>正在輸入……</span><i></i><i></i><i></i>';
      chatBox.appendChild(div);
      scrollChat();
      return div;
    }

    function wait(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function assistantSay(text, delay = readDelay){
      const typing = showTyping();
      await wait(typingDelay);
      typing.remove();
      addChatMessage(text);
      await wait(delay);
    }

    async function sayAll(messages, finalDelay = readDelay){
      for(let index = 0; index < messages.length; index += 1){
        const isLast = index === messages.length - 1;
        await assistantSay(messages[index], isLast ? finalDelay : readDelay);
      }
    }

    async function startAssistant(){
      await sayAll(openingMessages, 700);
      choiceActions.hidden = false;
      scrollChat();
    }

    async function chooseNeed(choice){
      const route = routes[choice];
      if(!route) return;
      choiceActions.hidden = true;
      addChatMessage(route.user, 'user');
      await wait(900);
      await sayAll(route.assistant, 500);
      nextBtn.hidden = false;
      nextBtn.style.display = 'block';
      scrollChat();
    }

    choiceActions.querySelectorAll('[data-choice]').forEach(button => {
      button.addEventListener('click', () => chooseNeed(button.dataset.choice), {once:true});
    });

    startAssistant();
  </script>
</body>
</html>
