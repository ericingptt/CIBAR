<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="../css/style.css">
  <title>帳面獲利</title>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div class="brand">資產總覽</div>
      <a class="home-link" href="../index.html">首頁</a>
    </div>
    <section class="platform profit-platform">
      <p>投入本金：NT$10,000</p>
      <div class="asset-row">
        <div>
          <span class="mini">總資產</span>
          <div class="big-money" id="money">NT$10,000</div>
        </div>
        <div class="profit-badge">+56.4%</div>
      </div>
      <div class="fake-chart" aria-label="投資平台帳面獲利 K 線圖">
        <div class="chart-top"><span>AI 智能量化合約</span><strong>LIVE</strong></div>
        <svg class="candlestick-chart" viewBox="0 0 360 180" role="img" aria-label="震盪上漲的 K 線圖">
          <defs>
            <linearGradient id="chartGlow" x1="0" x2="1" y1="1" y2="0"><stop offset="0%" stop-color="#39d98a"/><stop offset="100%" stop-color="#25d0ff"/></linearGradient>
          </defs>
          <g class="grid"><path d="M0 35H360M0 75H360M0 115H360M0 155H360"/><path d="M45 0V180M115 0V180M185 0V180M255 0V180M325 0V180"/></g>
          <polyline class="trend-line" points="22,142 58,126 94,136 130,101 166,112 202,76 238,88 274,54 310,63 342,30"/>
          <g class="candles">
            <g class="candle" style="--i:0"><line x1="24" y1="150" x2="24" y2="132"/><rect x="18" y="138" width="12" height="10"/></g>
            <g class="candle" style="--i:1"><line x1="58" y1="133" x2="58" y2="116"/><rect x="52" y="121" width="12" height="10"/></g>
            <g class="candle candle-down" style="--i:2"><line x1="92" y1="142" x2="92" y2="121"/><rect x="86" y="126" width="12" height="13"/></g>
            <g class="candle" style="--i:3"><line x1="126" y1="113" x2="126" y2="92"/><rect x="120" y="98" width="12" height="13"/></g>
            <g class="candle candle-down" style="--i:4"><line x1="160" y1="119" x2="160" y2="98"/><rect x="154" y="104" width="12" height="12"/></g>
            <g class="candle" style="--i:5"><line x1="194" y1="88" x2="194" y2="68"/><rect x="188" y="74" width="12" height="12"/></g>
            <g class="candle candle-down" style="--i:6"><line x1="228" y1="96" x2="228" y2="75"/><rect x="222" y="80" width="12" height="13"/></g>
            <g class="candle" style="--i:7"><line x1="262" y1="65" x2="262" y2="45"/><rect x="256" y="51" width="12" height="12"/></g>
            <g class="candle candle-down" style="--i:8"><line x1="296" y1="71" x2="296" y2="50"/><rect x="290" y="56" width="12" height="12"/></g>
            <g class="candle" style="--i:9"><line x1="330" y1="41" x2="330" y2="20"/><rect x="324" y="26" width="12" height="13"/></g>
          </g>
        </svg>
        <div class="chart-bottom"><span>今日收益</span><strong>+NT$5,640</strong></div>
      </div>
      <div class="stat"><span>今日收益</span><span>+NT$5,640</span></div>
      <div class="stat"><span>報酬率</span><span>+56.4%</span></div>
      <p>系統訊息：恭喜您完成今日操作。</p>
      <button class="btn withdraw-btn" id="withdrawBtn" onclick="go('scene01_withdraw_fail.html')" hidden>申請出金</button>
    </section>
  </main>
  <script src="../js/app.js"></script>
  <script>initProfitAnimation()</script>
</body>
</html>
