<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="css/style.css?v=20260720-9">
  <title>掃描線索</title>
</head>
<body>
  <main class="app ar-stage">
    <div class="topbar">
      <div class="brand">AI 視覺線索比對</div>
      <a class="home-link" href="index.html">首頁</a>
    </div>

    <section class="card scanner-card" id="scannerCard">
      <h2>請尋找現場可疑線索</h2>
      <p>請將鏡頭對準桌上真實物件或背板上的對應圖案。MindAR 會使用本頁唯一的相機流程進行追蹤。</p>
      <div class="scanner">
        <div id="trackerContainer" class="tracker-container"></div>
        <div class="scan-frame"></div>
        <div class="gesture-paused-note">手勢操作在此頁暫停，MindAR 需要獨佔鏡頭；離開本頁後手勢功能會自動恢復。<br>Gestures are paused here — MindAR needs sole camera access. They resume automatically on other pages.</div>
        <div class="hint" id="cameraStatus">AI 視覺線索比對中……</div>
      </div>
      <div class="tracker-stats">
        <p class="mini" id="trackerStatus">MindAR 尚未啟動……</p>
      </div>
      <div class="tracker-stats" id="trackerTargets"></div>
      <div class="tracker-stats">
        <p class="mini">模型：MindAR (image tracking)　FPS：<span id="trackerFps">-</span>　畫面間隔：<span id="trackerLatencyMs">-</span> ms</p>
      </div>
    </section>
  </main>
  <script src="js/camera-manager.js?v=20260720-9"></script>
  <script src="js/app.js?v=20260720-9"></script>
  <script>if(!hasLanguage()){location.replace('index.html')}</script>
  <script src="js/tracker-config.js?v=20260720-9"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "mind-ar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>
  <script type="module" src="js/tracker.js?v=20260720-9"></script>
</body>
</html>
